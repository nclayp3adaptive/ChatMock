services:
  chatmock:
    build:
      context: .
    image: ${CHATMOCK_IMAGE:-chatmock:local}
    container_name: chatmock
    command: ["serve"]
    restart: unless-stopped
    env_file: .env
    environment:
      - CHATGPT_LOCAL_HOME=/data
    ports:
      - "${CHATMOCK_BIND_IP:-127.0.0.1}:${PORT:-8000}:8000"
    volumes:
      - ${CHATMOCK_DATA_DIR:-./data}:/data
      - ./prompt.md:/app/prompt.md:ro
    networks:
      - default
      - librechat-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)\" "]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  chatmock-login:
    build:
      context: .
    image: ${CHATMOCK_IMAGE:-chatmock:local}
    profiles: ["login"]
    command: ["login"]
    environment:
      - CHATGPT_LOCAL_HOME=/data
      - CHATGPT_LOCAL_LOGIN_BIND=0.0.0.0
    volumes:
      - ${CHATMOCK_DATA_DIR:-./data}:/data
    ports:
      - "${CHATMOCK_BIND_IP:-127.0.0.1}:1455:1455"
    networks:
      - default

networks:
  librechat-network:
    external: true
